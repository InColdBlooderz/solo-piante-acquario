<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Solo Piante per Acquario</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="header">
  <div class="logo">🌿 Aquatic Plants</div>

  <nav>
    <a href="index.html">HOME</a>
    <a href="catalogo.html">CATALOGO</a>
    <a href="order-info.html">COME ORDINARE</a>
  </nav>

  <div class="auth">
    <a href="#">LOGIN</a>
    <a href="#">ISCRIVITI</a>
  </div>
</header>
  <main class="hero">
    <div class="hero-content">
  <h1>Piante per Acquario<br>di Qualità Premium</h1>
  <p>Scopri la nostra selezione professionale</p>

  <a href="catalogo.html" class="btn-main">
    SCOPRI IL CATALOGO →
  </a>
</div>
<main class="wrap">
    <section class="controls">
      <label>
        Cerca:
        <input id="search" placeholder="Cerca per nome..." />
      </label>
      <label>
        Difficoltà:
        <select id="filter-difficulty">
          <option value="">Tutte</option>
          <option value="Facile">Facile</option>
          <option value="Media">Media</option>
          <option value="Alta">Alta</option>
        </select>
      </label>
      <label>
        Tipo:
        <select id="filter-type">
          <option value="">Tutti</option>
          <option value="Foreground">Foreground</option>
          <option value="Midground">Midground</option>
          <option value="Background">Background</option>
          <option value="Stem">Stem</option>
          <option value="Rhizomatous">Rhizomatous</option>
          <option value="Floating">Floating</option>
          <option value="Bulb">Bulb</option>
          <option value="Moss">Moss</option>
        </select>
      </label>
    </section>

    <section id="plant-list" class="catalogo">
      <!-- JS popola qui le card -->
    </section>

    <footer class="site-footer">
      <p>© <span id="year"></span> Solo Piante per Acquario — Rivenditore ufficiale</p>
    </footer>
  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/cart.js"></script>
</body>
</html>
